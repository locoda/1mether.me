<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>He "Linda" Huang</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 400;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            /* Paper-like background: warm tone + faint horizontal lines */
            background-color: #f7f5f0;
            background-image:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 7px,
                    rgba(0,0,0,0.025) 7px,
                    rgba(0,0,0,0.025) 8px
                );
        }

        /* ── Card container ── */
        .card {
            max-width: 420px;
            width: 100%;
            background: #fffdf9;
            border: 1px solid #e2ddd4;
            border-radius: 4px;
            padding: 3rem 2.5rem 2.5rem;
            /* 替换旧的阴影和 outline，用一层特殊的 shadow 完美模拟双边框 */
            box-shadow:
                0 0 0 4px #fffdf9,         /* 模拟 4px 的白色间隙 */
                0 0 0 5px #f0ece4,         /* 模拟原先 1px 的外边框 */
                0 1px 2px rgba(0,0,0,0.04),
                0 4px 16px rgba(0,0,0,0.05),
                0 12px 40px rgba(0,0,0,0.04);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Avatar ── */
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 2.25rem;
        }

        /* ── Name ── */
        .name {
            font-family: "Playfair Display", Georgia, "Times New Roman", serif;
            font-weight: 700;
            font-size: 2.75rem;
            line-height: 1.15;
            letter-spacing: -0.5px;
            color: #141414;
            margin-bottom: 0.65rem;
        }
        .name em {
            font-style: italic;
            font-weight: 500;
            color: #666;
        }

        /* ── Title ── */
        .title {
            font-weight: 400;
            font-size: 0.9rem;
            color: #999;
            letter-spacing: 0.3px;
            margin-bottom: 2.25rem;
        }

        /* ── Separator ── */
        .sep {
            width: 28px;
            height: 2px;
            background: #d9d4cb;
            margin-bottom: 2.25rem;
        }

        /* ── Social links ── */
        .links {
            display: flex;
            gap: 1.1rem;
            flex-wrap: wrap;
        }
        .links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: #999;
            background: transparent;
            border: 1px solid #e2ddd4;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        .links a svg {
            width: 17px;
            height: 17px;
        }
        .links a:hover {
            color: #141414;
            border-color: #999;
            transform: translateY(-2px);
        }

        /* ── Footer ── */
        .footer {
            margin-top: 2.25rem;
            font-size: 0.68rem;
            color: #c4bfb5;
        }
        .footer a {
            color: #c4bfb5;
            text-decoration: none;
            border-bottom: 1px solid #e8e4db;
            transition: all 0.2s;
        }
        .footer a:hover {
            color: #666;
            border-bottom-color: #999;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            body { padding: 1.25rem; }
            .card {
                padding: 2.25rem 1.5rem 1.75rem;
            }
            .name { font-size: 2.1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            .card { animation: none; }
        }
    </style>
</head>
